name: Bug report
description: Report incorrect math, interaction, accessibility, export, offline, or rendering behavior
title: 'bug: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for a reproducible report. Shared URLs contain calculation values; remove anything you do not want public. Report vulnerabilities through the private Security Advisory link, not this form.
  - type: input
    id: version
    attributes:
      label: Smith Match version
      description: Read the version from the page footer or exported metadata.
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: share-url
    attributes:
      label: Live or share URL
      description: Include the full calculation URL when safe, or write “not available.”
      placeholder: https://wmacomber.github.io/smithchart/?v=1&...
    validations:
      required: true
  - type: textarea
    id: inputs
    attributes:
      label: RF inputs
      description: Load representation/values, Z0, frequency, velocity factor, stub termination, and selected solution.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest sequence that reproduces the problem.
      placeholder: |
        1. Open …
        2. Set …
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser, operating system, and device
      placeholder: Firefox 128, Windows 11, desktop
    validations:
      required: true
  - type: dropdown
    id: accessibility
    attributes:
      label: Accessibility impact
      options:
        - None known
        - Keyboard or focus
        - Screen reader or accessible name/state
        - Reflow, zoom, contrast, forced colors, or motion
        - Touch or pointer target
        - Other
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, logs, or reference calculation
      description: Drag files here. Remove secrets, personal information, and private URLs first.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report contains no vulnerability details or sensitive information.
          required: true
